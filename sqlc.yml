version: "2"

sql:
  - engine: "sqlite"
    schema: "internal/db/db_parqueadero/schema.sql"
    queries: "internal/db/db_parqueadero"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/storage/sqlcdb_parqueadero"

  - engine: "sqlite"
    schema: "internal/db/db_transporte/schema.sql"
    queries: "internal/db/db_transporte"
    gen:
      go:
        package: "sqlcdb_transporte"
        out: "internal/storage/sqlcdb_transporte"